name: fernweather
description: A Flutter weather app with current conditions and forecasts.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/
